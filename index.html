<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart PHC Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://unpkg.com/tesseract.js@v4.1.1/dist/tesseract.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#eef7f7}
header{background:#0077b6;color:#fff;padding:15px;text-align:center;font-size:20px}
nav{display:flex;background:#e0f2f1}
nav button{flex:1;padding:10px;border:none;background:none;cursor:pointer}
nav button.active{background:#00b894;color:#fff}
section{display:none;padding:15px}
section.active{display:block}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:8px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd}
th{background:#0077b6;color:#fff}
.btn{background:#00b894;color:#fff;border:none;padding:8px;border-radius:5px;margin:3px;cursor:pointer}
input{padding:8px;width:100%;margin-top:5px}
</style>
</head>

<body>

<div id="login">
<h3 style="text-align:center">Smart PHC Login</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<header>💊 Smart PHC Medicine Store</header>

<nav>
<button class="tab active" data="stock">Stock</button>
<button class="tab" data="expiry">Expiry</button>
<button class="tab" data="scanner">Scanner</button>
<button class="tab" data="reports">Reports</button>
</nav>

<section id="stock" class="active">

<div class="card">
<input type="file" id="excel">
<input type="file" id="deduct" accept="image/*,application/pdf">
<input id="search" placeholder="Search medicine...">
<select id="rack"></select>
<button class="btn" onclick="deleteAll()">Delete All</button>
</div>

<div class="card">
<table id="table">
<thead><tr><th>Name</th><th>Rack</th><th>Qty</th><th>Expiry</th></tr></thead>
<tbody></tbody>
</table>
</div>

</section>

<section id="expiry">
<div id="expiryList"></div>
</section>

<section id="scanner">
<button class="btn" onclick="startQR()">Start QR</button>
<div id="qr"></div>
</section>

<section id="reports">
<button class="btn" onclick="exportExcel()">Export Excel</button>
<button class="btn" onclick="exportPDF()">Export PDF</button>
</section>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

/* 🔑 REPLACE WITH YOUR CONFIG */
const app = initializeApp({
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB"
});

const auth = getAuth();
const db = getDatabase();

let data = [];

/* LOGIN */
window.login = ()=>signInWithEmailAndPassword(auth,email.value,pass.value);
onAuthStateChanged(auth,u=>{
  if(u){login.style.display="none";app.style.display="block";load();}
});

/* DB */
function save(){set(ref(db,"stock"),data);}
function load(){get(ref(db,"stock")).then(s=>{data=s.val()||[];render();});}

/* FAST RENDER */
function render(){
  let html="";
  let racks=new Set();

  data.forEach(m=>{
    racks.add(m.Rack||"");
    html+=`<tr>
      <td>${m["Medicine Name"]||m.name}</td>
      <td>${m.Rack||""}</td>
      <td>${m.Quantity||m.qty}</td>
      <td>${m["Expiry Date"]||m.exp}</td>
    </tr>`;
  });

  table.querySelector("tbody").innerHTML=html;

  rack.innerHTML="<option>All</option>"+[...racks].map(r=>`<option>${r}</option>`).join("");

  checkLowStock();
}

/* LOW STOCK */
function checkLowStock(){
  data.forEach(m=>{
    if((m.Quantity||0)<=10){
      console.log("Low:",m["Medicine Name"]);
    }
  });
}

/* SEARCH */
search.oninput=()=>{
  let s=search.value.toLowerCase();
  let rows=[...data].filter(m=>(m["Medicine Name"]||"").toLowerCase().includes(s));
  table.querySelector("tbody").innerHTML=rows.map(m=>`
    <tr><td>${m["Medicine Name"]}</td><td>${m.Rack||""}</td><td>${m.Quantity}</td><td>${m["Expiry Date"]}</td></tr>
  `).join("");
};

/* EXCEL */
excel.onchange=e=>{
  const r=new FileReader();
  r.onload=x=>{
    const wb=XLSX.read(new Uint8Array(x.target.result),{type:"array"});
    data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    save();render();
  };
  r.readAsArrayBuffer(e.target.files[0]);
};

/* OCR CLEAN */
function clean(t){
  return t.replace(/[^a-z0-9\s]/gi," ").replace(/\s+/g," ").toLowerCase();
}

/* DEDUCTION */
deduct.onchange=async e=>{
  const file=e.target.files[0];

  if(file.type.startsWith("image")){
    const {data:{text}}=await Tesseract.recognize(file,'eng');
    let t=clean(text);
    let m=t.match(/([a-z\s]+)\s(\d+)/);

    if(m){
      apply(m[1],parseInt(m[2]));
    }
  }
};

/* APPLY DEDUCTION */
function apply(name,qty){
  let item=data.find(x=>(x["Medicine Name"]||"").toLowerCase().includes(name.trim()));
  if(item){
    item.Quantity-=qty;
    saveHistory(name,qty);
  }
  save();render();
}

/* HISTORY */
function saveHistory(name,qty){
  set(ref(db,"history/"+Date.now()),{
    medicine:name,
    qty:qty,
    date:new Date().toISOString()
  });
}

/* DELETE SAFE */
window.deleteAll=()=>{
  let c=prompt("Type DELETE");
  if(c==="DELETE"){data=[];save();render();}
};

/* EXPORT */
window.exportExcel=()=>XLSX.writeFile(
  XLSX.utils.book_append_sheet(XLSX.utils.book_new(),XLSX.utils.json_to_sheet(data),"Stock"),
  "stock.xlsx"
);

window.exportPDF=()=>html2pdf().from(table).save();

/* QR */
let qr;
window.startQR=()=>{
  qr=new Html5Qrcode("qr");
  qr.start({facingMode:"environment"},{fps:10},msg=>{
    alert(msg);
    qr.stop();
  });
};

/* TABS */
document.querySelectorAll(".tab").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(b.dataset).classList.add("active");
  };
});

</script>

</body>
</html>
